<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>첨단고 2026 1학기 시간표</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 공통 UI 스타일 */
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 10px; background-color: #f4f4f4; margin: 0; color: #333; }
        .container { max-width: 420px; width: 100%; box-sizing: border-box; margin: 0 auto; background: white; padding: 15px 10px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        h1 { color: #222; font-size: 18px; margin-top: 5px; word-break: keep-all; }
        .search-box { margin: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .row-box { display: flex; gap: 5px; justify-content: center; width: 100%; align-items: center; }
        input[type="text"], input[type="password"], select { padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; color: #333; }
        select { width: 80px; }
        button { padding: 10px 15px; font-size: 14px; cursor: pointer; background-color: #555; color: white; border: none; border-radius: 4px; transition: background-color 0.2s; white-space: nowrap; }
        button:hover { background-color: #333; }
        .btn-batch { background-color: #777; width: 170px; }
        .btn-teacher { background-color: #444; width: 130px; }
        .btn-download { width: 100%; display: none; padding: 12px; font-size: 15px; font-weight: bold; margin-top: 15px; }
        
        /* 시간표 테이블 스타일 */
        #capture-area { background-color: #ffffff; padding: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: fixed; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 1px 0; text-align: center; vertical-align: middle; }
        th { background-color: #eee; font-weight: bold; font-size: 11px; height: 24px; color: #333; }
        td { height: 42px; overflow: hidden; }
        .subject { font-weight: bold; color: #111; display: block; margin-bottom: 1px; font-size: 10.5px; letter-spacing: -1px; line-height: 1.1; word-break: keep-all; overflow-wrap: normal; }
        .room { font-size: 9px; color: #666; display: block; margin-top: 2px; letter-spacing: -0.5px; word-break: keep-all; }
        .elective-cell { background-color: #f2f2f2 !important; }
        .hover-cell:hover { background-color: #e0e0e0 !important; cursor: pointer; }
        #student-name-display { font-size: 16px; margin-top: 5px; margin-bottom: 10px; color: #222; font-weight: bold; }

        /* 명렬표 뷰어 스타일 */
        #roster-container { display: none; max-width: 900px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); text-align: left; overflow-x: auto; }
        .roster-header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .roster-header-box h2 { margin: 0; font-size: 18px; color: #111; }
        .roster-table { width: 100%; min-width: 800px; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        .roster-table th, .roster-table td { border: 1px solid #555; padding: 5px 2px; text-align: center; word-break: keep-all; box-sizing: border-box; }
        .roster-table th { background-color: #f9f9f9; }
        .btn-print-roster { background-color: #555; margin-right: 5px; }
        .btn-close-roster { background-color: #888; }

        #print-container { display: none; }

        /* 인쇄 출력물 공통 제어 */
        @page { size: A4 portrait; margin: 10mm; }
        @media print {
            * { border-radius: 0 !important; box-shadow: none !important; }
            body { background: #fff; padding: 0; margin: 0; color: #000; }
            .container, .btn-download { display: none !important; }
            
            /* 1. 학급 일괄 인쇄용 (A4 4분할) */
            body.print-batch #print-container { display: block !important; padding: 0; }
            body.print-batch #roster-container { display: none !important; }
            .print-page { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 210mm; height: 297mm; page-break-after: always; padding: 10mm; box-sizing: border-box; gap: 10mm; }
            .print-item { width: 90mm; border: 1px dashed #ccc; padding: 5mm; display: flex; flex-direction: column; align-items: center; justify-content: center; }
            
            /* 2. 교사 명렬표 인쇄용 (A4 1장 가득) */
            body.print-roster #roster-container { display: block !important; border: none; padding: 0; margin: 0; max-width: 100%; width: 100%; overflow: visible !important; }
            body.print-roster #print-container { display: none !important; }
            body.print-roster .btn-print-roster, body.print-roster .btn-close-roster { display: none !important; }
            body.print-roster .roster-table { font-size: 10.5px !important; width: 99% !important; min-width: auto !important; margin: 0 auto !important; table-layout: fixed; border: 1.5px solid #000 !important; }
            body.print-roster .roster-table th, body.print-roster .roster-table td { height: 23px; padding: 1px !important; border: 1px solid #000 !important; color: #000 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>첨단고 2026 1학기 시간표</h1>
    <div class="search-box">
        <div class="row-box">
            <input type="text" id="studentId" placeholder="학번(5자리)" maxlength="5" style="width: 140px;">
            <button onclick="searchTimetable()" style="width: 80px;">조회</button>
        </div>
        <hr style="width:100%; border:0; border-top:1px solid #ddd; margin:2px 0;">
        <div class="row-box">
            <select id="sel-grade"><option value="">학년</option></select>
            <select id="sel-class"><option value="">학급</option></select>
            <button onclick="batchPrint()" class="btn-batch">학급 일괄 인쇄</button>
        </div>
        <hr style="width:100%; border:0; border-top:1px solid #ddd; margin:2px 0;">
        <div class="row-box">
            <input type="text" id="teacherName" placeholder="교사명" style="width: 80px;">
            <input type="password" id="teacherPwd" placeholder="비밀번호" style="width: 80px;">
            <button onclick="searchTeacherTimetable()" class="btn-teacher">교사시간표 출력</button>
        </div>
        <hr style="width:100%; border:0; border-top:1px solid #ddd; margin:2px 0;">
        <div class="row-box">
            <select id="subj-grade" onchange="updateSubjectList()" style="width: 70px;"><option value="">학년</option></select>
            <select id="subj-name" onchange="updateSplitCodeList()" style="width: 140px;"><option value="">선택과목</option></select>
            <select id="subj-code" style="width: 80px;"><option value="">분반</option></select>
        </div>
        <div class="row-box" style="margin-top:2px;">
            <input type="password" id="subjPwd" placeholder="비밀번호" style="width: 80px;">
            <button onclick="searchSubjectRoster()" class="btn-teacher" style="width: 155px; background-color: #2c3e50;">교과명렬표 출력</button>
        </div>
    </div>

    <div id="timetable-container" style="display:none;">
        <div id="capture-area">
            <h3 id="student-name-display"></h3>
            <table id="timetable">
                <thead><tr><th style="width: 25px;"></th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead>
                <tbody id="timetable-body"></tbody>
            </table>
        </div>
        <button class="btn-download" id="downloadBtn" onclick="downloadImage()">이미지 저장</button>
    </div>
</div>

<div id="roster-container"></div>
<div id="print-container"></div>

<script>
    // 복호화 유틸
    function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

    let teacherSchedule = [];
    let electiveInfo = [];
    let studentDataMap = {}; 
    let periodBlocks = {}; 
    let allElectiveKeys = []; 
    let subjectHierarchy = {}; 

    const COL_MAP = {
        '월': [2, 3, 4, 5, 6, 7, 8], '화': [9, 10, 11, 12, 13, 14, 15],
        '수': [16, 17, 18, 19, 20, 21], '목': [22, 23, 24, 25, 26, 27, 28], '금': [29, 30, 31, 32, 33, 34, 35]
    };

    // 초기 데이터 로드 및 파싱
    window.onload = function() {
        teacherSchedule = Papa.parse(b64_to_utf8(document.getElementById('csv-teacher').textContent.trim()), { header: false }).data;
        electiveInfo = Papa.parse(b64_to_utf8(document.getElementById('csv-elective').textContent.trim()), { header: true }).data;

        let grades = new Set();
        let classes = new Set();

        document.querySelectorAll('.csv-student').forEach(el => {
            Papa.parse(b64_to_utf8(el.textContent.trim()), { header: true }).data.forEach(row => {
                let g = row['학년'], c = row['반'], n = row['번호'];
                if (g && c && n) {
                    let key = `${g}-${c}-${n}`;
                    studentDataMap[key] = studentDataMap[key] ? { ...studentDataMap[key], ...row } : row;
                    grades.add(g); classes.add(c);
                }
            });
        });

        const sg = document.getElementById('sel-grade'), sc = document.getElementById('sel-class');
        [...grades].sort().forEach(g => sg.add(new Option(g, g)));
        [...classes].sort((a,b)=>a-b).forEach(c => sc.add(new Option(c, c)));

        // 교과명렬표 드롭박스용 데이터 추출
        for (let key in studentDataMap) {
            let row = studentDataMap[key];
            let g = String(row['학년']).trim();
            for (let col in row) {
                if (['순번','학년','반','번호','이름','비고'].includes(col)) continue;
                let val = row[col];
                if (val && val.trim() !== "") {
                    let scVal = val.trim();
                    let bMatch = scVal.match(/^[A-Za-z]+/);
                    if (bMatch) {
                        if (!subjectHierarchy[g]) subjectHierarchy[g] = {};
                        if (!subjectHierarchy[g][col]) subjectHierarchy[g][col] = new Set();
                        subjectHierarchy[g][col].add(scVal);
                    }
                }
            }
        }
        
        const sgSubj = document.getElementById('subj-grade');
        Object.keys(subjectHierarchy).sort().forEach(g => sgSubj.add(new Option(g, g)));

        electiveInfo.forEach(e => {
            let s = e['축약과목명'], f = e['교과명'], sc = e['선택반명'], g = String(e['학년']), rm = e['수업교실'];
            if (sc && g) {
                let b = (sc.match(/^[A-Z]+/) || [""])[0];
                let no = sc.replace(/[\-_]/g, '');
                [s, f].forEach(name => { if(name) {
                    [sc, no, "_" + no].forEach(v => allElectiveKeys.push({ 
                        key: (name + v).replace(/\s+/g,'').toUpperCase(), 
                        grade: g, block: b, formalName: f, splitCode: sc, room: rm ? rm.trim() : "" 
                    }));
                }});
            }
        });

        for (let day in COL_MAP) {
            COL_MAP[day].forEach((colIdx, p) => {
                let bCounts = { '2': {}, '3': {} };
                teacherSchedule.slice(4).forEach((row, i) => { if(i%2===0 && row[colIdx]) {
                    let match = allElectiveKeys.find(ek => ek.key === row[colIdx].replace(/\s+/g,'').toUpperCase());
                    if(match) bCounts[match.grade][match.block] = (bCounts[match.grade][match.block] || 0) + 1;
                }});
                periodBlocks[`${day}-${p+1}`] = { '2': Object.keys(bCounts['2']).reduce((a, b) => bCounts['2'][a] > bCounts['2'][b] ? a : b, null), '3': Object.keys(bCounts['3']).reduce((a, b) => bCounts['3'][a] > bCounts['3'][b] ? a : b, null) };
                if(!bCounts['2'][periodBlocks[`${day}-${p+1}`]['2']]) periodBlocks[`${day}-${p+1}`]['2'] = null;
                if(!bCounts['3'][periodBlocks[`${day}-${p+1}`]['3']]) periodBlocks[`${day}-${p+1}`]['3'] = null;
            });
        }
    };

    function updateSubjectList() {
        const g = document.getElementById('subj-grade').value;
        const sn = document.getElementById('subj-name');
        const sc = document.getElementById('subj-code');
        sn.innerHTML = '<option value="">선택과목</option>';
        sc.innerHTML = '<option value="">분반</option>';
        if (!g || !subjectHierarchy[g]) return;
        
        Object.keys(subjectHierarchy[g]).sort().forEach(subj => {
            sn.add(new Option(subj, subj));
        });
    }

    function updateSplitCodeList() {
        const g = document.getElementById('subj-grade').value;
        const subj = document.getElementById('subj-name').value;
        const sc = document.getElementById('subj-code');
        sc.innerHTML = '<option value="">분반</option>';
        if (!g || !subj || !subjectHierarchy[g][subj]) return;
        
        [...subjectHierarchy[g][subj]].sort().forEach(code => {
            sc.add(new Option(code, code));
        });
    }

    function searchSubjectRoster() {
        const g = document.getElementById('subj-grade').value;
        const subj = document.getElementById('subj-name').value;
        const code = document.getElementById('subj-code').value;
        const pwd = document.getElementById('subjPwd').value;

        if (!g || !subj || !code) return alert("학년, 선택과목, 분반을 모두 선택하세요.");
        if (pwd !== "xhlrms") return alert("비밀번호가 일치하지 않습니다.");

        showRoster('elective', g, subj, code);
    }

    // 교사 시간표 조회
    function searchTeacherTimetable() {
        const tName = document.getElementById('teacherName').value.trim();
        const pwd = document.getElementById('teacherPwd').value;

        if (!tName) return alert("교사명을 입력하세요.");
        if (pwd !== "xhlrms") return alert("비밀번호가 일치하지 않습니다.");

        let tRowIdx = -1;
        for (let i = 4; i < teacherSchedule.length; i += 2) {
            if (teacherSchedule[i] && teacherSchedule[i][1] && teacherSchedule[i][1].replace(/\s+/g,'') === tName.replace(/\s+/g,'')) {
                tRowIdx = i; break;
            }
        }
        if (tRowIdx === -1) return alert("해당 교사명으로 등록된 시간표가 없습니다.");

        document.getElementById('student-name-display').innerText = `${tName} 선생님 수업 시간표`;
        const tbody = document.getElementById('timetable-body');
        tbody.innerHTML = "";
        
        for(let p = 1; p <= 7; p++) {
            let tr = document.createElement('tr');
            let th = document.createElement('td');
            th.innerText = p; th.style.fontWeight = "bold"; th.style.backgroundColor = "#eee";
            tr.appendChild(th);
            
            ['월','화','수','목','금'].forEach(day => {
                let td = document.createElement('td');
                if (day === '수' && p === 7) { tr.appendChild(td); return; }
                
                let colIdx = COL_MAP[day][p-1];
                let tSubj = teacherSchedule[tRowIdx][colIdx] || "";
                let tRoom = teacherSchedule[tRowIdx+1] ? (teacherSchedule[tRowIdx+1][colIdx] || "") : "";
                
                let foundSubject = ""; let foundRoom = ""; let isElective = false;

                if (tSubj.trim() !== "") {
                    let tSubjNorm = tSubj.replace(/\s+/g, '').toUpperCase();
                    let matchedEl = allElectiveKeys.find(ek => ek.key === tSubjNorm);
                    
                    if (matchedEl) {
                        foundSubject = matchedEl.formalName + " " + matchedEl.splitCode;
                        foundRoom = (matchedEl.room && matchedEl.room !== "미정") ? matchedEl.room : tRoom.trim();
                        isElective = true;
                        
                        let fn = matchedEl.formalName.replace(/'/g, "\\'");
                        let sc = matchedEl.splitCode.replace(/'/g, "\\'");
                        td.setAttribute('onclick', `showRoster('elective', '${matchedEl.grade}', '${fn}', '${sc}')`);
                        td.classList.add("hover-cell");
                    } else {
                        foundSubject = tSubj.trim();
                        foundRoom = tRoom.trim();
                        isElective = false;
                        
                        if(foundRoom.match(/[1-3]-[0-9]+/)) {
                            let fs = foundSubject.replace(/'/g, "\\'");
                            let fr = foundRoom.replace(/'/g, "\\'");
                            td.setAttribute('onclick', `showRoster('common', '', '${fs}', '${fr}')`);
                            td.classList.add("hover-cell");
                        }
                    }
                }

                if (foundSubject) {
                    if (isElective) td.classList.add("elective-cell"); 
                    let roomHtml = foundRoom ? `<span class="room">${foundRoom}</span>` : "";
                    if (foundSubject.includes("프로그래") && !foundSubject.includes("프로그래밍")) foundSubject = foundSubject.replace("프로그래", "프로그래밍");
                    td.innerHTML = `<span class="subject">${foundSubject}</span>${roomHtml}`;
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        }
        document.querySelector('.container').style.display = 'block';
        document.getElementById('timetable-container').style.display = 'block';
        document.getElementById('roster-container').style.display = 'none';
        document.getElementById('downloadBtn').style.display = 'block';
    }

    // 명렬표 렌더링
    function showRoster(type, grade, subject, detail) {
        let students = [];
        let title = "";

        if (type === 'elective') {
            title = `${subject} (${detail}) 명렬표`;
            for (let key in studentDataMap) {
                let row = studentDataMap[key];
                if (String(row['학년']) === String(grade) && row[subject] && row[subject].trim() === detail) {
                    students.push(row);
                }
            }
        } else if (type === 'common') {
            title = `${subject} (${detail}) 명렬표`;
            let matches = [...detail.matchAll(/([1-3])-([0-9]+)/g)];
            let classList = matches.map(m => `${m[1]}-${m[2]}`);
            
            for (let key in studentDataMap) {
                let row = studentDataMap[key];
                let gc = `${row['학년']}-${row['반']}`;
                if (classList.includes(gc)) students.push(row);
            }
        }

        if (students.length === 0) return alert("해당 수업의 학생 명단을 찾을 수 없습니다.");

        students.sort((a, b) => {
            if (a['학년'] !== b['학년']) return parseInt(a['학년']) - parseInt(b['학년']);
            if (a['반'] !== b['반']) return parseInt(a['반']) - parseInt(b['반']);
            return parseInt(a['번호']) - parseInt(b['번호']);
        });

        let html = `
            <div class="roster-header-box">
                <h2>${title}</h2>
                <div>
                    <button onclick="printRoster()" class="btn-print-roster">인쇄</button>
                    <button onclick="closeRoster()" class="btn-close-roster">닫기</button>
                </div>
            </div>
            <table class="roster-table">
                <thead>
                    <tr>
                        <th style="width:4%;">연번</th>
                        <th style="width:4%;">학년</th>
                        <th style="width:4%;">반</th>
                        <th style="width:4%;">번호</th>
                        <th style="width:8%;">이름</th>
                        <th style="width:6%;">비고</th>
        `;
        for (let i = 0; i < 15; i++) { html += `<th></th>`; }
        html += `</tr></thead><tbody>`;

        students.forEach((s, idx) => {
            let note = s['비고'] || "";
            html += `<tr>
                <td>${idx + 1}</td>
                <td>${s['학년']}</td>
                <td>${s['반']}</td>
                <td>${s['번호']}</td>
                <td style="font-weight:bold;">${s['이름']}</td>
                <td style="font-size:10.5px; color:#444;">${note}</td>`;
            for (let i = 0; i < 15; i++) { html += `<td></td>`; }
            html += `</tr>`;
        });
        html += `</tbody></table>`;

        document.getElementById('roster-container').innerHTML = html;
        document.querySelector('.container').style.display = 'none';
        document.getElementById('roster-container').style.display = 'block';
    }

    function closeRoster() {
        document.getElementById('roster-container').style.display = 'none';
        document.querySelector('.container').style.display = 'block';
    }

    function printRoster() {
        document.body.classList.add('print-roster');
        window.print();
        document.body.classList.remove('print-roster');
    }

    // 학생 개별 데이터 추출
    function getStudentTimetableData(grade, classNum, studentNum) {
        let info = studentDataMap[`${grade}-${classNum}-${studentNum}`];
        if(!info) return null;
        let electives = [];
        for (let sub in info) { if (!['순번','학년','반','번호','이름','비고'].includes(sub) && info[sub]) {
            let sc = info[sub].trim(), b = (sc.match(/^[A-Za-z]+/) || [""])[0].toUpperCase();
            let el = electiveInfo.find(e => e['교과명'] === sub && e['선택반명'] === sc && String(e['학년']) === grade);
            let sn = el ? el['축약과목명'] : "";
            let keys = []; let no = sc.replace(/[\-_]/g, '');
            [sn, sub].forEach(n => { if(n) [sc, no, "_" + no].forEach(v => keys.push((n+v).replace(/\s+/g,'').toUpperCase())); });
            electives.push({ block: b, formalName: sub, splitCode: sc, room: el ? el['수업교실'] : "미정", expectedKeys: keys, shortName: sn });
        }}
        return { name: info['이름'], electives };
    }

    // 학생 개인 시간표 테이블 렌더링
    function renderTimetableHTML(sid, name, grade, classNum, electives) {
        let html = `<div class="print-item"><h3>${sid} ${name}</h3><table><thead><tr><th style="width:20px"></th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead><tbody>`;
        for(let p=1; p<=7; p++) {
            html += `<tr><td style="font-weight:bold; background:#eee">${p}</td>`;
            ['월','화','수','목','금'].forEach(day => {
                if(day==='수' && p===7) { html += '<td></td>'; return; }
                if((day==='월'&&p===1)||(day==='수'&&(p===5||p===6))) { html += '<td><span class="subject">창체</span></td>'; return; }
                let colIdx = COL_MAP[day][p-1], activeB = periodBlocks[`${day}-${p}`][grade];
                let sub = "", rm = "", isEl = false;
                if(activeB) {
                    let matched = electives.filter(e => e.block === activeB);
                    if(matched.length > 1) {
                        let tSub = "";
                        for(let i=4; i<teacherSchedule.length; i+=2) { if(teacherSchedule[i][colIdx]) {
                            let norm = teacherSchedule[i][colIdx].replace(/\s+/g,'').toUpperCase();
                            let find = matched.find(e => e.expectedKeys.includes(norm));
                            if(find) { matched = [find]; break; }
                        }}
                    }
                    if(matched.length >= 1) { sub = matched[0].formalName + " " + matched[0].splitCode; rm = matched[0].room; isEl = true; }
                } else {
                    for(let i=4; i<teacherSchedule.length-1; i+=2) {
                        let tRm = teacherSchedule[i+1][colIdx] || "";
                        if(tRm.split(',').map(s=>s.trim()).includes(`${grade}-${classNum}`)) { sub = teacherSchedule[i][colIdx]; break; }
                    }
                }
                let cls = isEl ? 'elective-cell' : '';
                sub = sub.replace("프로그래", "프로그래밍");
                html += `<td class="${cls}"><span class="subject">${sub}</span><span class="room">${rm}</span></td>`;
            });
            html += '</tr>';
        }
        return html + '</tbody></table></div>';
    }

    // 학생 개인 조회 실행
    function searchTimetable() {
        const sid = document.getElementById('studentId').value;
        if(sid.length !== 5) return alert("학번 5자리를 입력하세요.");
        const grade = sid[0], cls = parseInt(sid.substring(1,3)), num = parseInt(sid.substring(3,5));
        let data = getStudentTimetableData(grade, cls, num);
        if(!data) return alert("학생 정보가 없습니다.");
        document.getElementById('student-name-display').innerText = `${sid} ${data.name}`;
        document.getElementById('timetable-body').innerHTML = renderTimetableHTML("", "", grade, cls, data.electives).match(/<tbody>([\s\S]*)<\/tbody>/)[1];
        document.querySelector('.container').style.display = 'block';
        document.getElementById('roster-container').style.display = 'none';
        document.getElementById('timetable-container').style.display = 'block';
        document.getElementById('downloadBtn').style.display = 'block';
    }

    // 학급 일괄 인쇄 실행
    function batchPrint() {
        const g = document.getElementById('sel-grade').value, c = document.getElementById('sel-class').value;
        if(!g || !c) return alert("학년과 학급을 선택하세요.");
        let students = Object.keys(studentDataMap).filter(k => k.startsWith(`${g}-${c}-`)).sort((a,b) => parseInt(a.split('-')[2]) - parseInt(b.split('-')[2]));
        let html = "";
        for(let i=0; i<students.length; i+=4) {
            html += '<div class="print-page">';
            for(let j=i; j<i+4; j++) {
                if(students[j]) {
                    let [sg, sc, sn] = students[j].split('-');
                    let d = getStudentTimetableData(sg, sc, sn);
                    let sid = sg + sc.padStart(2,'0') + sn.padStart(2,'0');
                    html += renderTimetableHTML(sid, d.name, sg, sc, d.electives);
                } else { html += '<div></div>'; }
            }
            html += '</div>';
        }
        document.getElementById('print-container').innerHTML = html;
        document.body.classList.add('print-batch');
        window.print();
        document.body.classList.remove('print-batch');
    }

    // 이미지 저장 다운로드
    function downloadImage() {
        html2canvas(document.getElementById('capture-area'), { scale: 3 }).then(canvas => {
            let link = document.createElement('a');
            let displayTitle = document.getElementById('student-name-display').innerText;
            link.download = displayTitle.replace(/\s+/g, '_') + '_시간표.png';
            link.href = canvas.toDataURL(); link.click();
        });
    }
</script>
